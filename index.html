<!DOCTYPE html>
<html>
<head>
    <title>APHIPARASAKTHI Engineering College Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
        }

        .login-box{
            width:350px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align:center;
        }

        .logo{
            width:120px;
            height:120px;
            margin-bottom:15px;
        }

        h2{
            color:#b30000;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:95%;
            padding:10px;
            background:#b30000;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#8b0000;
        }
    </style>
</head>

<body>

<div class="login-box">

    <img src="images.png" alt="College Logo" class="logo">

    <h2>APHIPARASAKTHI Engineering College</h2>

    <form>
        <input type="text" placeholder="Username" required><br>

        <input type="password" placeholder="Password" required><br>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
